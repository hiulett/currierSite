[phases.setup]
nixPkgs = ['php82', 'nodejs', 'npm', 'php82Packages.composer', 'libpng', 'libjpeg', 'freetype', 'zlib', 'libzip', 'tesseract', 'ghostscript']

[phases.build]
cmds = [
    'install-php-extensions gd zip bcmath intl pdo_mysql redis imagick',
    'composer install --optimize-autoloader --no-scripts --no-interaction',
    'npm install',
    'npm run build',
    'php artisan optimize:clear'
]

[phases.predeploy]
cmds = [
    'php artisan migrate --force',
    'mkdir -p storage/app/public/logos',
    'php artisan storage:link --force'
]
