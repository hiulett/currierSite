[phases.setup]
nixPkgs = ['php82', 'nodejs', 'npm', 'composer']

[phases.build]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm install',
    'npm run build'
]

[phases.deploy]
cmds = [
    'php artisan migrate --force',
    'php artisan optimize',
    'php artisan serve --host 0.0.0.0 --port $PORT'
]
